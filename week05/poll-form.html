<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 130 | User Poll Form with Styling</title>
  <!-- Link to external CSS file (styles/poll-form.css) -->
  <link rel="stylesheet" href="styles/poll-form.css">
  <!-- 
    Author: WDD 130 Student
    Description: HTML poll form enhanced with semantic div containers (form-item, column1, column2)
    and linked to a CSS file for proper styling per W05 activity.
  -->
</head>

<body>
  <!-- Header: contains page identification -->
  <header>
    <h1>📋 Web Fundamentals Poll</h1>
    <p>Share your preferences & feedback — styled with best practices</p>
  </header>

  <!-- Main content: the core interactive poll form -->
  <main>
    <!-- 
      The <form> element wraps all input controls.
      Div containers with classes "form-item", "column2", "column1" are added as required.
    -->
    <form>
      <!-- 1. FULL NAME - text input, required (column2 layout) -->
      <div class="form-item column2">
        <label for="fullname">Full name:</label>
        <input type="text" id="fullname" name="fullname" required placeholder="e.g., Maria Sanchez">
      </div>

      <!-- 2. EMAIL ADDRESS - email type, required (column2 layout) -->
      <div class="form-item column2">
        <label for="useremail">Email address:</label>
        <input type="email" id="useremail" name="useremail" required placeholder="you@example.com">
      </div>

      <!-- 3. FAVORITE BROWSER - select dropdown (column1 layout) -->
      <div class="form-item column1">
        <label for="browser">What is your favorite browser?</label>
        <select name="browser" id="browser">
          <option value="chrome">Google Chrome</option>
          <option value="safari">Apple Safari</option>
          <option value="edge">Microsoft Edge</option>
          <option value="brave">Brave</option>
          <option value="firefox">Mozilla Firefox</option>
          <option value="other">Other / I don't have one</option>
        </select>
      </div>

      <!-- 4. HOUSEHOLD PET QUESTION - single checkbox (column1 layout) -->
      <div class="form-item column1">
        <!-- Using a nested div for better checkbox alignment with label (optional but clean) -->
        <div class="checkbox-group">
          <input type="checkbox" id="pet" name="pet" value="yes">
          <label for="pet">Do you have a household pet?</label>
        </div>
      </div>

      <!-- 5. PLACES LIVED - textarea with placeholder & rows (column2 layout to keep label aligned) -->
      <div class="form-item column2">
        <label for="feedback">List the places you have lived:</label>
        <textarea id="feedback" name="feedback" rows="4"
          placeholder="e.g., Phoenix, AZ → Portland, OR → Boise, ID (one per line or comma separated)"></textarea>
      </div>

      <!-- Submit button: sends form data (simulated, no actual server action) -->
      <div class="form-actions">
        <button type="submit">Submit Poll</button>
      </div>
    </form>
  </main>

  <!-- Footer: copyright and additional context -->
  <footer>
    <p>&copy; <span id="current-year">2026</span> Brigham Young University-Idaho | All rights reserved</p>
    <p>WDD 130 - Web Fundamentals | Styled HTML Form Activity</p>
  </footer>
</body>

</html>
